<style>
:root {
  --cream: #faf7f2;
  --warm: #f0ebe0;
  --sand: #e0d5c4;
  --bark: #9c8b72;
  --earth: #5c4f3a;
  --dark: #2a221a;
  --green: #5a6e52;
  --green-light: #eef2ec;
  --rose: #b87d7d;
  --rose-light: #f7efef;
  --ink: #3d3530;
  --muted: #9a8f85;
  --border: #ddd5c6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

/* HERO */
.hero {
  text-align: center;
  padding: 3rem 1rem 2rem;
  border-bottom: 0.5px solid var(--border);
  background: var(--warm);
}
.hero-mono {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bark);
  margin-bottom: 10px;
}
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  font-style: italic;
  color: var(--earth);
  line-height: 1.1;
}
.hero-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: .5px;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 1.5rem auto;
}
.cd-box {
  background: var(--cream);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 12px 18px;
  text-align: center;
  min-width: 70px;
}
.cd-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 400;
  color: var(--earth);
  line-height: 1;
}
.cd-lbl {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bark);
  margin-top: 4px;
}

/* UMBANDA countdown */
.cd-umbanda {
  font-size: 11px;
  color: var(--green);
  margin-top: .5rem;
  letter-spacing: .3px;
}

/* TABS */
.tabs-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1rem;
}
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 0.5px solid var(--border);
  margin: 1.5rem 0 0;
  overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: .3px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab.active { color: var(--earth); border-bottom: 2px solid var(--earth); font-weight: 500; }
.tab:hover { color: var(--ink); }

/* PANELS */
.panel { display: none; padding: 1.5rem 0; }
.panel.active { display: block; }

/* PROGRESS */
.prog-wrap { margin-bottom: 1.2rem; }
.prog-bar { background: var(--sand); border-radius: 3px; height: 4px; overflow: hidden; }
.prog-fill { height: 4px; border-radius: 3px; background: var(--earth); transition: width .5s ease; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* SECTIONS */
.sec-title {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bark);
  margin: 1.4rem 0 .5rem;
  padding-bottom: 6px;
  border-bottom: 0.5px solid var(--border);
}

/* ITEMS */
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.item:last-child { border-bottom: none; }
.item:hover { background: var(--warm); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 4px; }
.chk {
  width: 14px; height: 14px; min-width: 14px;
  border-radius: 3px;
  border: 0.5px solid var(--sand);
  display: flex; align-items: center; justify-content: center;
  margin-top: 3px;
  font-size: 8px;
  transition: all .15s;
  color: #fff;
}
.item.done .chk, .item.pre .chk {
  background: var(--green);
  border-color: var(--green);
}
.item.done .chk::after, .item.pre .chk::after { content: '✓'; }
.itxt { font-size: 13px; line-height: 1.45; color: var(--ink); }
.item.done .itxt, .item.pre .itxt {
  text-decoration: line-through;
  color: var(--muted);
}
.note {
  font-size: 10px;
  color: var(--bark);
  font-style: italic;
  display: block;
  margin-top: 1px;
}

/* DATES */
.date-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 9px 12px;
  background: var(--warm);
  border-radius: 6px;
  border: 0.5px solid var(--border);
  margin: .4rem 0;
}
.date-day {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--earth);
  min-width: 36px;
  text-align: center;
  line-height: 1;
}
.date-month {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--bark);
  text-align: center;
}
.date-info { flex: 1; }
.date-title { font-size: 13px; color: var(--ink); font-weight: 500; }
.date-time { font-size: 11px; color: var(--muted); margin-top: 1px; }
.date-card.past { opacity: .45; }
.date-card.today { border-color: var(--rose); background: var(--rose-light); }
.date-card.today .date-day { color: var(--rose); }
.date-card.today .date-month { color: var(--rose); }
.date-card.umb-day { border-color: var(--green); background: var(--green-light); }
.date-card.umb-day .date-day { color: var(--green); }
.date-card.umb-day .date-month { color: var(--green); }

/* MALA */
.mala-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem; }
@media(max-width:500px) { .mala-grid { grid-template-columns: 1fr; } }

/* BADGE */
.badge {
  display: inline-block;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 20px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: .3px;
}
.badge.msg { background: #e8f0fe; color: #3557b3; }
.badge.umb { background: var(--green-light); color: var(--green); }
</style>
</head>

// ── RENDER ─────────────────────────────────────────────────────────────
function buildList(containerId, sections, progId, lblId) {
  const wrap = document.getElementById(containerId);
  let total = 0, done = 0;
  let html = '';
  sections.forEach(sec => {
    html += `<div class="sec-title">${sec.sec}</div>`;
    sec.items.forEach(it => {
      const isDone = saved[it.id] === true;
      const isPre = it.pre && !saved.hasOwnProperty(it.id);
      const cls = isDone ? 'done' : (isPre ? 'pre' : '');
      const badge = it.badge ? `<span class="badge ${it.badge}">${it.badge==='msg'?'mensagem':it.badge}</span>` : '';
      const note = it.note ? `<span class="note">${it.note}</span>` : '';
      html += `<div class="item ${cls}" onclick="toggle('${it.id}',this)" data-pre="${it.pre?'1':'0'}">
        <div class="chk"></div>
        <div class="itxt">${it.t}${badge}${note}</div>
      </div>`;
      total++;
      if (isDone || isPre) done++;
    });
  });
  wrap.innerHTML = html;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById(progId).style.width = pct + '%';
  document.getElementById(lblId).textContent = `${done} de ${total} concluídos (${pct}%)`;
}

function toggle(id, el) {
  const isPre = el.dataset.pre === '1' && !saved.hasOwnProperty(id);
  if (isPre) {
    // pre-done: primeiro clique desmarca
    saved[id] = false;
    el.classList.remove('pre');
  } else {
    saved[id] = !saved[id];
    el.classList.toggle('done', saved[id]);
  }
  persist();
  rebuildAll();
}

function persist() {
  try { localStorage.setItem(SK, JSON.stringify(saved)); } catch(e) {}
}

function rebuildAll() {
  buildList('l-geral',   lists.geral,   'pg-geral',   'pl-geral');
  buildList('l-umbanda', lists.umbanda, 'pg-umbanda', 'pl-umbanda');
  buildList('l-vespera', lists.vespera, 'pg-vespera', 'pl-vespera');
}

// DATAS
function buildDates() {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  let html = '<div class="sec-title">Compromissos & marcos</div>';
  datas.forEach(d => {
    const dt = new Date(d.iso);
    const past = dt < now;
    const isToday = d.iso.slice(0,10) === today;
    const cls = d.highlight ? 'date-card today' : d.highlight2 ? 'date-card umb-day' : past ? 'date-card past' : 'date-card';
    html += `<div class="${cls}">
      <div><div class="date-day">${d.d}</div><div class="date-month">${d.m}</div></div>
      <div class="date-info">
        <div class="date-title">${d.title}</div>
        <div class="date-time">${d.time}</div>
      </div>
    </div>`;
  });
  document.getElementById('l-datas').innerHTML = html;
}

// TABS
function sw(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('p-' + tab).classList.add('active');
}

// COUNTDOWN
function updateCd() {
  const target = new Date('2026-05-09T15:00:00');
  const umb    = new Date('2026-05-02T13:30:00');
  const now    = new Date();
  const diff   = target - now;
  const diffU  = umb - now;
  if (diff > 0) {
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-d').textContent = d;
    document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
  }
  const uel = document.getElementById('cd-umb');
  if (diffU > 0) {
    const du = Math.floor(diffU / 86400000);
    uel.textContent = `🌿 Umbanda em ${du} dia${du!==1?'s':''}`;
  } else {
    uel.textContent = '';
  }
}
